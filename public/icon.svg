
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="512"
    height="512"
    viewBox="0 0 512 512">

    <defs>
        <linearGradient id="bgGradient"
                        x1="0%"
                        y1="0%"
                        x2="100%"
                        y2="100%">
            <stop offset="0%" stop-color="#06FFBF"/>
            <stop offset="100%" stop-color="#00D9A0"/>
        </linearGradient>

        <linearGradient id="glass"
                        x1="0%"
                        y1="0%"
                        x2="0%"
                        y2="100%">
            <stop offset="0%"
                  stop-color="#FFFFFF"
                  stop-opacity="0.38"/>

            <stop offset="100%"
                  stop-color="#FFFFFF"
                  stop-opacity="0"/>
        </linearGradient>

        <radialGradient id="glow"
                        cx="50%"
                        cy="45%"
                        r="70%">
            <stop offset="0%"
                  stop-color="#FFFFFF"
                  stop-opacity="0.25"/>

            <stop offset="100%"
                  stop-color="#FFFFFF"
                  stop-opacity="0"/>
        </radialGradient>

        <filter id="shadow"
                x="-50%"
                y="-50%"
                width="200%"
                height="200%">
            <feDropShadow
                dx="0"
                dy="15.36"
                stdDeviation="20.48"
                flood-color="#000000"
                flood-opacity="0.22"/>
        </filter>
    </defs>

    <rect
        x="0"
        y="0"
        width="512"
        height="512"
        rx="112.64"
        fill="url(#bgGradient)"/>

    <rect
        x="0"
        y="0"
        width="512"
        height="512"
        rx="112.64"
        fill="url(#glow)"/>

    <path
        d="M40 40 H472 Q472 170 256 180 Q80 180 40 40 Z"
        fill="url(#glass)"/>

    <g filter="url(#shadow)">
        <rect
            x="246"
            y="112"
            width="20"
            height="58"
            rx="10"
            fill="#F5FFFC"/>

        <circle
            cx="256"
            cy="96"
            r="18"
            fill="#F5FFFC"/>

        <rect
            x="120"
            y="214"
            width="42"
            height="92"
            rx="21"
            fill="#F5FFFC"/>

        <rect
            x="350"
            y="214"
            width="42"
            height="92"
            rx="21"
            fill="#F5FFFC"/>

        <rect
            x="132"
            y="150"
            width="248"
            height="220"
            rx="92"
            fill="#F5FFFC"/>

        <rect
            x="162"
